<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Selector</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  color:white;
  background:black;
  animation: fadeInPage .6s ease;
}

@keyframes fadeInPage{
  from{opacity:0; transform:scale(1.02);}
  to{opacity:1; transform:scale(1);}
}

/* Background */
.bg-layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  transition:opacity .6s ease;
  z-index:-4;
  animation: bgDrift 20s ease-in-out infinite alternate;
}

@keyframes bgDrift{
  0%{ background-position:center; }
  100%{ background-position:52% 48%; }
}

#bg1{opacity:1;}
#bg2{opacity:0;}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:-2;
}

/* ===== Ambient Dust ===== */
.dust-container{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:-1;
  overflow:hidden;
}

.dust{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation: drift 12s ease-in-out infinite alternate;
}

@keyframes drift{
  0%{ transform:translate(0,0); }
  50%{ transform:translate(15px,-20px); }
  100%{ transform:translate(-10px,10px); }
}

/* Title */
h1{
  font-family:'Orbitron',sans-serif;
  font-size:38px;
  margin-bottom:50px;
  z-index:2;
  transition:.3s ease;
  text-shadow:0 0 15px currentColor;
  animation: glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{ text-shadow:0 0 10px currentColor; }
  50%{ text-shadow:0 0 20px currentColor; }
}

/* Slider */
.slider-container{
  display:flex;
  align-items:center;
  gap:30px;
  z-index:2;
}

.slider-wrapper{
  width:600px;
  height:260px;
  overflow:hidden;
}

.slider{
  display:flex;
  transition:transform .5s ease;
}

/* Card */
.card{
  min-width:600px;
  height:260px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  overflow:hidden;
  transition:.3s ease;
  opacity:0.6;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,255,255,0.04);
}

.card.active{
  transform:scale(1.03);
  box-shadow:
    0 15px 40px rgba(0,0,0,0.6),
    0 0 30px rgba(255,255,255,0.25);
  opacity:1;
}

/* Shine */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform:skewX(-25deg);
}

.card.shine::before{
  animation:shineMove .6s ease;
}

@keyframes shineMove{
  from{left:-100%;}
  to{left:150%;}
}

/* Shake */
.shake{
  animation:softShake .3s ease;
}

@keyframes softShake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(1px);}
  100%{transform:translateX(0);}
}

.card-content{
  text-align:center;
}

.card-content h2{
  font-family:'Orbitron',sans-serif;
  margin-bottom:10px;
}

.card-content p{
  font-size:15px;
  opacity:0.85;
}

/* Arrows */
.arrow{
  font-size:35px;
  cursor:pointer;
  padding:12px 16px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  transition:.3s;
}

.arrow:hover{
  transform:scale(1.2);
}

/* Button */
.explore-btn{
  margin-top:60px;
  padding:14px 40px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#5f00ff,#ff00c8);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  z-index:3;
}

.explore-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(255,0,200,0.7);
}

/* Loading */
.loading-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:0;
  visibility:hidden;
  transition:opacity .4s ease;
}

.loading-screen.active{
  opacity:1;
  visibility:visible;
}

.loader-text{
  font-family:'Orbitron',sans-serif;
  margin-bottom:20px;
  font-size:22px;
}

.progress-bar{
  width:300px;
  height:6px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#5f00ff,#ff00c8);
  transition:width .2s ease;
}
</style>
</head>
<body>

<div class="bg-layer" id="bg1"></div>
<div class="bg-layer" id="bg2"></div>
<div class="overlay"></div>
<div class="dust-container" id="dustContainer"></div>

<h1 id="title">Select the World to Dive Into</h1>

<div class="slider-container" id="sliderContainer">
  <div class="arrow" onclick="prev()">&#10094;</div>

  <div class="slider-wrapper">
    <div class="slider" id="slider">

      <div class="card active">
        <div class="card-content">
          <h2>Egypt Museum</h2>
          <p>Discover ancient pharaoh treasures in immersive AR</p>
        </div>
      </div>

      <div class="card">
        <div class="card-content">
          <h2>Roman Empire</h2>
          <p>Step inside the rise of ancient Roman civilization</p>
        </div>
      </div>

    </div>
  </div>

  <div class="arrow" onclick="next()">&#10095;</div>
</div>

<button class="explore-btn" onclick="startLoading()">Explore in AR</button>

<div class="loading-screen" id="loadingScreen">
  <div class="loader-text">Initializing AR Environment...</div>
  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>
</div>

<script>
let currentIndex = 0;
let activeBg = 1;

const slider = document.getElementById("slider");
const cards = document.querySelectorAll(".card");
const sliderContainer = document.getElementById("sliderContainer");
const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");
const dustContainer = document.getElementById("dustContainer");
const loadingScreen = document.getElementById("loadingScreen");
const progressBar = document.getElementById("progressBar");
const title = document.getElementById("title");

const worlds = [
  { img:"pyramids.jpg", color:"#ffd700", dust:55 },
  { img:"rome.jpg", color:"#ff4d4d", dust:85 }
];

function createDust(color, count){
  dustContainer.innerHTML = "";

  for(let i=0;i<count;i++){
    const dust = document.createElement("div");
    dust.classList.add("dust");

    const size = 3 + Math.random()*3;
    dust.style.width = size + "px";
    dust.style.height = size + "px";

    dust.style.background = color;
    dust.style.boxShadow = `0 0 8px ${color}`;
    dust.style.left = Math.random()*100 + "vw";
    dust.style.top = Math.random()*100 + "vh";
    dust.style.animationDuration = (8 + Math.random()*8) + "s";
    dust.style.opacity = 0.3 + Math.random()*0.4;

    dustContainer.appendChild(dust);
  }
}

function crossfadeBackground(index){
  const nextBg = activeBg === 1 ? bg2 : bg1;
  const currentBg = activeBg === 1 ? bg1 : bg2;

  nextBg.style.backgroundImage = `url(${worlds[index].img})`;
  nextBg.style.opacity = 1;
  currentBg.style.opacity = 0;

  activeBg = activeBg === 1 ? 2 : 1;
}

function triggerShake(){
  sliderContainer.classList.add("shake");
  setTimeout(()=>sliderContainer.classList.remove("shake"),300);
}

function triggerShine(card){
  card.classList.add("shine");
  setTimeout(()=>card.classList.remove("shine"),600);
}

function updateSlider(){
  slider.style.transform = `translateX(-${currentIndex*600}px)`;
  cards.forEach(c=>c.classList.remove("active"));
  cards[currentIndex].classList.add("active");

  crossfadeBackground(currentIndex);
  title.style.color = worlds[currentIndex].color;

  triggerShake();
  triggerShine(cards[currentIndex]);

  createDust(worlds[currentIndex].color, worlds[currentIndex].dust);
}

function next(){
  if(currentIndex < cards.length-1){
    currentIndex++;
    updateSlider();
  }
}

function prev(){
  if(currentIndex > 0){
    currentIndex--;
    updateSlider();
  }
}

function startLoading(){
  loadingScreen.classList.add("active");

  let progress = 0;
  const interval = setInterval(()=>{
    progress += 4;
    progressBar.style.width = progress + "%";

    if(progress >= 100){
      clearInterval(interval);
      setTimeout(()=>{
        loadingScreen.classList.remove("active");
      },500);
    }
  },80);
}

updateSlider();
</script>

</body>
</html>
