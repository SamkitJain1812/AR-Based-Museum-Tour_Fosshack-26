<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Museum Tour</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
  position: relative;
}

/* ===== Fixed Cinematic Background ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
    url("background.png") no-repeat center center;
  background-size: cover;
  z-index: -5;
  animation: bgZoom 20s ease-in-out infinite alternate;
  transform: scale(1.15);
}

@keyframes bgZoom {
  0% { transform: scale(1.15) translate(0,0); }
  100% { transform: scale(1.2) translate(-1%, -1%); }
}

/* ===== CYBERPUNK GLOW GRID ===== */
body::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 50%;
  background-image:
    linear-gradient(rgba(0,255,255,0.7) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.7) 1px, transparent 1px);
  background-size: 50px 50px;
  transform: perspective(700px) rotateX(60deg);
  transform-origin: bottom;
  animation: gridMove 6s linear infinite, gridPulse 3s ease-in-out infinite;
  opacity: 0.9;
  filter:
    drop-shadow(0 0 10px rgba(0,255,255,0.8))
    drop-shadow(0 0 25px rgba(0,255,255,0.6));
  pointer-events: none;
  mask-image: linear-gradient(to top, black 70%, transparent 100%);
}

@keyframes gridMove {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 50px, 50px 0; }
}

@keyframes gridPulse {
  0%,100% { opacity: 0.8; }
  50% { opacity: 1; }
}

/* ===== GRID EXIT ANIMATION ===== */
@keyframes gridRise {
  0% {
    transform: perspective(700px) rotateX(60deg) translateY(0);
    opacity: 0.9;
  }
  100% {
    transform: perspective(700px) rotateX(60deg) translateY(-120%);
    opacity: 0;
  }
}

body.grid-exit::after {
  animation: gridRise 0.9s ease forwards;
}

/* ===== PARTICLES ===== */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  top: 0;
  left: 0;
  z-index: 1;
}

.particle {
  position: absolute;
  bottom: -10px;
  width: 4px;
  height: 4px;
  background: rgba(0, 255, 255, 0.8);
  border-radius: 50%;
  box-shadow:
    0 0 10px rgba(0,255,255,0.9),
    0 0 20px rgba(0,255,255,0.6);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(0);
    opacity: 1;
  }
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* ===== Title ===== */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 52px;
  letter-spacing: 4px;
  color: #00f2ff;
  text-shadow:
    0 0 15px rgba(0, 242, 255, 0.9),
    0 0 30px rgba(0, 242, 255, 0.6);
  margin-bottom: 20px;
  z-index: 2;
}

/* ===== Subtitle ===== */
.subtitle {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 40px;
  color: #c8faff;
  z-index: 2;
}

/* ===== Neon Button ===== */
.btn {
  position: relative;
  padding: 15px 40px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  background: linear-gradient(90deg, #5f00ff, #ff00c8);
  overflow: hidden;
  transition: all 0.3s ease;
  z-index: 2;
}

.btn::before {
  content: "";
  position: absolute;
  inset: -4px;
  background: linear-gradient(90deg, #5f00ff, #ff00c8);
  border-radius: 14px;
  filter: blur(20px);
  opacity: 0.8;
  z-index: -1;
  transition: 0.3s ease;
}

.btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.25);
  transform: skewX(-25deg);
  transition: 0.6s;
}

.btn:hover {
  transform: translateY(-4px);
  background: linear-gradient(90deg, #7a00ff, #ff4dd2);
}

.btn:hover::before {
  filter: blur(30px);
  opacity: 1;
}

.btn:hover::after {
  left: 125%;
}

.btn:active {
  transform: scale(0.95);
}

.btn.clicked {
  background: linear-gradient(90deg, #00f2ff, #0072ff);
}

.btn.clicked::before {
  background: linear-gradient(90deg, #00f2ff, #0072ff);
}

/* ===== Page Fade ===== */
body.fade-screen {
  opacity: 0;
  transform: scale(0.98);
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<h1 class="title">STEP INSIDE HISTORY</h1>

<p class="subtitle">
  Experience ancient artifacts in Augmented Reality
</p>

<button class="btn" id="startBtn" onclick="startTour()">LET'S BEGIN</button>

<script>
const particleContainer = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  const particle = document.createElement("div");
  particle.classList.add("particle");
  particle.style.left = Math.random() * 100 + "vw";
  particle.style.animationDuration = (5 + Math.random() * 10) + "s";
  particle.style.opacity = Math.random();
  particleContainer.appendChild(particle);
}

function startTour() {
  const btn = document.getElementById("startBtn");

  btn.classList.add("clicked");

  // Grid rises upward
  document.body.classList.add("grid-exit");

  // Fade screen after slight delay
  setTimeout(() => {
    document.body.classList.add("fade-screen");
  }, 500);

  // Redirect
  setTimeout(() => {
    window.location.href = "artifacts.html";
  }, 1100);
}
</script>

</body>
</html>
